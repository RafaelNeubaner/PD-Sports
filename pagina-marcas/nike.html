<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Sports</title>
    <link
      rel="icon"
      href="/assets/media/icons/favicon.svg"
      type="image/x-icon"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/homepage.css" />
    <link rel="stylesheet" href="/pagina-marcas/css/marcas.css" />

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="/js/darkmode.js" defer></script>
    <script type="module" src="/js/header.js" defer></script>
    <script type="module" src="/pagina-marcas/js/marcas.js" defer></script>
  </head>
  <body data-marca="nike">
    <!-- HEADER -->
    <header>
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <a class="navbar-brand d-block d-md-none" href="/index.html"
            ><img
              src="/assets/media/logo/logo-light.svg"
              alt="PD Sports"
              id="logo"
          /></a>

          <search class="containerSearch">
            <a class="navbar-brand d-none d-md-block" href="/index.html">
              <img
                src="/assets/media/logo/logo-light.svg"
                alt="PD Sports"
                id="logo"
              />
            </a>

            <form
              action="/busca/busca-produto.html"
              class="d-none d-md-flex position-relative inputForm"
            >
              <input
                type="text"
                name="query"
                class="form-control pe-5"
                placeholder="O que você está procurando?"
                aria-label="Pesquisar produtos"
              />
              <button class="btn" type="button" id="button-search-desktop">
                <i class="bi bi-search"></i>
              </button>
            </form>

            <ul class="navbar-nav align-items-center">
              <li class="nav-item d-block d-lg-none">
                <a href="#" class="nav-link"
                  ><i class="bi bi-question-circle"></i
                ></a>
              </li>
              <li class="nav-item d-none d-lg-block">
                <a href="/pagina-informativa/faq.html" class="nav-link"
                  ><i class="bi bi-question-circle"></i>Tire suas dúvidas</a
                >
              </li>

              <button
                class="btn d-block d-md-none"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mobileSearchBox"
                aria-expanded="false"
                aria-controls="mobileSearchBox"
              >
                <i class="bi bi-search"></i>
              </button>

              <li class="nav-item">
                <a id="themeToggle" class="themeToggle" aria-pressed="false"
                  ><i class="bi bi-moon-stars"></i
                ></a>
              </li>

              <li class="nav-item position-relative">
                <a href="/carrinho/index.html" class="nav-link"
                  ><i class="bi bi-cart3"></i
                ></a>
                <span class="cart-badge">0</span>
              </li>
              <li class="nav-item d-none d-md-block iconProfile">
                <a href="/perfil/perfil.html" class="nav-link"
                  ><i class="bi bi-person"></i
                ></a>
              </li>
              <li class="nav-item d-none d-md-block loginLink">
                <a href="/login/index.html" class="nav-link"
                  ><i class="bi bi-box-arrow-in-right"></i>Entrar</a
                >
              </li>
            </ul>
          </search>

          <div class="collapse w-100 mt-2 d-md-none" id="mobileSearchBox">
            <form>
              <input
                type="text"
                class="form-control pe-5"
                placeholder="O que você está procurando?"
              />
              <button class="btn" type="button">
                <i class="bi bi-search"></i>
              </button>
            </form>
          </div>

          <menu class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item d-block d-sm-none loginLink">
                <a href="/perfil/perfil.html" class="nav-link"
                  ><i class="bi bi-person me-1"></i>Entre ou Cadastre-se<i
                    class="bi bi-chevron-right ms-1"
                  ></i
                ></a>
              </li>

              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?categoria=esportes"
                  >Esportes</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?genero=Masculino"
                  >Masculino</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?genero=Feminino"
                  >Feminino</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?genero=infantil"
                  >Infantil</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?promocao=ofertas"
                  >Promoções</a
                >
              </li>
              <li class="nav-item d-none d-lg-block">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?categoria=futebol"
                  >Futebol</a
                >
              </li>
              <li class="nav-item d-none d-lg-block">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?categoria=corrida"
                  >Corrida</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/pagina-informativa/sobre-nos.html"
                  >Sobre nós</a
                >
              </li>
            </ul>
          </menu>
        </div>
      </nav>
    </header>

    <!-- HERO -->
    <section id="hero" class="container-fluid mx-auto p-0">
      <article class="slide w-100">
        <a
          href="/busca/busca-produto.html?marca=nike"
          aria-label="Ver todos os produtos da Nike"
        >
          <img
            src="/assets/media/images/marcas/nike/hero-nike.png"
            alt="Banner Nike"
            style="object-position: 50% 0%; width: 100%"
            class="d-none d-lg-block d-sm-block"
          />

          <img
            src="/assets/media/images/marcas/nike/hero-nike-mobile.png"
            alt="Banner Nike Mobile"
            style="object-position: 50% 0%; width: 100%"
            class="d-block d-lg-none d-sm-none heroMobile"
          />
        </a>
      </article>
    </section>

    <main>
      <section
        id="containerDestaquesMarca"
        class="container-fluid p-0"
      ></section>

      <!-- CTA -->
      <section class="cta">
        <article>
          <a href="/produto/index.html?id=71.1" id="CTAHover">
            <!-- desktop -->
            <img
              class="d-none d-lg-block d-sm-block"
              src="/assets/media/images/marcas/nike/cta-nike.png"
              alt="pack de chuteiras da nike"
              id="CTA"
            />
            <!-- mobile -->
            <img
              class="d-block d-lg-none d-sm-none"
              src="/assets/media/images/marcas/nike/cta-nike-mobile.png"
              alt="pack de chuteiras da nike mobile"
              id="CTAMobile"
            />
          </a>
        </article>
      </section>

      <section class="ofertas mb64 container mt-5">
        <hgroup class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="sectTitle m-0">Ofertas da Semana</h2>
          <a
            class="vejaMais link"
            href="/busca/busca-produto.html?promocao=ofertas&marca=nike"
          >
            <i class="bi bi-plus-circle me-1" ></i>Veja Mais

          </a>
        </hgroup>

        <div class="sectionCarousel position-relative">
          <button
            class="btn-primary carousel-control prev d-none d-lg-flex"
            id="btnLeftOfertasMarca"
          >
            <i class="bi bi-chevron-left"></i>
          </button>

          <div class="slider-wrapper" id="sliderWrapperOfertasMarca">
            <div
              class="slider-track sliderContainer"
              id="sliderTrackOfertasMarca"
            ></div>
          </div>

          <button
            class="btn-primary carousel-control next d-none d-lg-flex"
            id="btnRightOfertasMarca"
          >
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
      </section>
    </main>

    <footer class="bgHeader">
      <p class="textCenter">
        © PD Sports 2026 | Desenvolvido por Pablo, Pedro e Rafael.
      </p>
    </footer>
  </body>
</html>
