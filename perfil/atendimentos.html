<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Sports | Meus Pedidos</title>
    <link
      rel="icon"
      href="/assets/media/icons/favicon.svg"
      type="image/x-icon"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/perfil/css/atendimentos.css" />

    <!-- Scripts -->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Custom JS -->
    <script src="../js/users/isLogged.js" type="module"></script>
    <script src="/js/darkmode.js"></script>
    <script type="module" src="/perfil/js/meus-atendimentos.js"></script>
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <a class="navbar-brand d-block d-md-none" href="/index.html"
            ><img
              src="/assets/media/logo/logo-light.svg"
              alt="PD Sports"
              id="logo"
          /></a>

          <search class="containerSearch">
            <a class="navbar-brand d-none d-md-block" href="/index.html">
              <img
                src="/assets/media/logo/logo-light.svg"
                alt="PD Sports"
                id="logo"
              />
            </a>

            <form
              action="/busca/busca-produto.html"
              class="d-none d-md-flex position-relative inputForm"
            >
              <input
                type="text"
                name="query"
                class="form-control pe-5"
                placeholder="O que você está procurando?"
                aria-label="Pesquisar produtos"
              />
              <button class="btn" type="button" id="button-search-desktop">
                <i class="bi bi-search"></i>
              </button>
            </form>

            <ul class="navbar-nav align-items-center">
              <li class="nav-item d-block d-lg-none">
                <a href="/pagina-informativa/faq.html" class="nav-link"
                  ><i class="bi bi-question-circle"></i
                ></a>
              </li>
              <li class="nav-item d-none d-lg-block">
                <a href="/pagina-informativa/faq.html" class="nav-link"
                  ><i class="bi bi-question-circle"></i>Tire suas dúvidas</a
                >
              </li>

              <button
                class="btn d-block d-md-none"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mobileSearchBox"
                aria-expanded="false"
                aria-controls="mobileSearchBox"
              >
                <i class="bi bi-search"></i>
              </button>

              <li class="nav-item">
                <a id="themeToggle" class="themeToggle" aria-pressed="false"
                  ><i class="bi bi-moon-stars"></i
                ></a>
              </li>

              <li class="nav-item position-relative">
                <a href="/carrinho/index.html" class="nav-link"
                  ><i class="bi bi-cart3"></i
                ></a>
                <span class="cart-badge">0</span>
              </li>
              <li class="nav-item d-none d-md-block iconProfile">
                <a href="/perfil/perfil.html" class="nav-link"
                  ><i class="bi bi-person"></i
                ></a>
              </li>
              <li class="nav-item d-none logoutLink">
                <a
                  href="/index.html"
                  class="btn nav-link logoutBtn"
                  style="
                    cursor: pointer;
                    border: none;
                    background: none;
                    padding: 0.5rem 0.75rem;
                  "
                >
                  <i class="bi bi-box-arrow-right"></i>
                </a>
              </li>
              <li class="nav-item d-none d-md-block loginLink">
                <a href="/login/index.html" class="nav-link"
                  ><i class="bi bi-box-arrow-in-right"></i>Entrar</a
                >
              </li>
            </ul>
          </search>

          <div class="collapse w-100 mt-2 d-md-none" id="mobileSearchBox">
            <form action="/busca/busca-produto.html">
              <input
                type="text"
                name="query"
                class="form-control pe-5"
                placeholder="O que você está procurando?"
              />
              <button class="btn" type="submit">
                <i class="bi bi-search"></i>
              </button>
            </form>
          </div>

          <menu class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item d-block d-sm-none loginLink">
                <a href="/login/index.html" class="nav-link"
                  ><i class="bi bi-person me-1"></i>Entre ou Cadastre-se<i
                    class="bi bi-chevron-right ms-1"
                  ></i
                ></a>
              </li>

              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?categoria=esportes"
                  >Esportes</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?genero=Masculino"
                  >Masculino</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?genero=Feminino"
                  >Feminino</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?genero=infantil"
                  >Infantil</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?promocao=ofertas"
                  >Promoções</a
                >
              </li>
              <li class="nav-item d-none d-lg-block">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?categoria=futebol"
                  >Futebol</a
                >
              </li>
              <li class="nav-item d-none d-lg-block">
                <a
                  class="nav-link"
                  href="/busca/busca-produto.html?categoria=corrida"
                  >Corrida</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/pagina-informativa/sobre-nos.html"
                  >Sobre nós</a
                >
              </li>
            </ul>
          </menu>
        </div>
      </nav>
    </header>

    <main class="container">
      <!-- ATENDIMENTO -->
      <section id="atendimento">
        <button class="btnOutline" id="voltar">Voltar</button>

        <div class="chamados" id="containerAtendimentos"></div>

        <button class="btnPrimary" id="abrirAtendimentoBtn">
          Abrir novo atendimento
        </button>
      </section>
    </main>

    <!-- MODAL NOVO ATENDIMENTO -->
    <dialog id="modalAtendimento" class="modal-custom">
      <header class="modal-header bg">
        <h2>Abrir Atendimento</h2>
        <button
          type="button"
          class="btnOutline btn-fechar-modal"
          aria-label="Fechar modal"
        >
          Fechar
        </button>
      </header>

      <form id="formNovoAtendimento">
        <h3>Nome: <span class="nomeCliente"></span></h3>
        <h3>Telefone: <span class="telefoneCliente"></span></h3>
      
        <label for="codigoPedido" class="sr-only">Código do Pedido</label>
        <input
          type="text"
          id="codigoPedido"
          name="codigoPedido"
          placeholder="Código do Pedido"
          maxlength="6"
        />

        <label for="areaAtendimento" class="sr-only">Área de atendimento</label>
        <select id="areaAtendimento" name="areaAtendimento" required>
          <option value="" disabled selected>
            Dropdown áreas de atendimento
          </option>
          <option value="duvida" >Dúvidas gerais</option>
          <option value="entrega" class="pedidoOption">Problemas com a entrega</option>
          <option value="pagamento" class="pedidoOption">Pagamento e Estorno</option>
        </select>

        <label for="descricao" class="sr-only">Descrição</label>
        <textarea
          id="descricao"
          name="descricao"
          rows="6"
          placeholder="Descrição"
          required
        ></textarea>

        <div class="modal-footer">
          <button type="submit" class="btnPrimary btn-enviar-modal">
            Abrir Atendimento
          </button>
        </div>
      </form>
    </dialog>
  </body>
</html>
