<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Sports</title>
    <link rel="icon" href="assets/media/icons/fav-icon.png" type="image/png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/home.css" />

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Custom JS -->
    <script src="js/scripts.js" defer></script>
    <script src="js/darkmode.js" defer></script>
    <script src="js/carrossel.js" defer></script>
  </head>
  <body>
    <button
      id="themeToggle"
      class="themeToggle"
      type="button"
      aria-pressed="false"
    >
      <i class="bi bi-moon-stars"></i>
    </button>

    <section id="hero" class="container-fluid">
      <section class="carrossel-wrap">
        <input type="radio" name="carrossel" id="r1" class="carrossel-radio" />
        <input type="radio" name="carrossel" id="r2" class="carrossel-radio" />
        <input type="radio" name="carrossel" id="r3" class="carrossel-radio" />
        <div class="carrossel">
          <div class="slides_dots">
            <div class="slides_autoplay">
              <article class="slide">
                <a href="#" aria-label="Ir para página de produtos">
                  <img
                  src="assets/media/images/home/imagem-hero.jpg"
                  alt="Slide 1"
                  style="object-position: 50% 0%;"
                  class="d-none d-lg-block d-sm-block"
                  />
                  <img
                  src="assets/media/images/home/imagem-hero-mobile.jpg"
                  alt="Slide 1"
                  style="object-position: 50% 0%;"
                  class="d-block d-lg-none d-sm-none"
                  />
                </a>
              </article>
              <article class="slide">
                <a href="#" aria-label="Ir para página de produtos">
                  <img
                    src="assets/media/images/home/imagem-hero-2.png"
                    alt="Slide 2"
                    class="d-none d-lg-block d-sm-block"
                  />
                  <img
                    src="assets/media/images/home/imagem-hero-2-mobile.png"
                    alt="Slide 2"
                    style="object-position: 50% 0%;"
                    class="d-block d-lg-none d-sm-none"
                  />
                </a>
              </article>
              <article class="slide">
                <a href="#" aria-label="Ir para página de produtos">
                  <img
                    src="assets/media/images/home/imagem-hero-3.png"
                    alt="Slide 3"
                    class="d-none d-lg-block d-sm-block"
                  />
                  <img
                    src="assets/media/images/home/imagem-hero-3-mobile.png"
                    alt="Slide 3"
                    style="object-position: 50% 0%;"
                    class="d-block d-lg-none d-sm-none"
                  />
                </a>
              </article>
            </div>
          </div>
        </div>
        <div class="dots">
          <label for="r1" class="dot" aria-label="Ir para slide 1"></label>
          <label for="r2" class="dot" aria-label="Ir para slide 2"></label>
          <label for="r3" class="dot" aria-label="Ir para slide 3"></label>
        </div>
      </section>
    </section>

    <section id="catDestaques" class="container">
      <button
        type="button"
        class="catArrow catArrow-left"
        aria-label="Categoria anterior"
      >
        <i class="bi bi-chevron-left"></i>
      </button>

      <div class="catDestaquesViewport" >
        <div class="catDestaquesTrack">
          <article class="h-100 catCard">
            <a href="#" class="link2">
              <figure class="textCenter h-100">
                <div class="border">
                  <img
                    src="assets/media/images/home/categoria-destaque-1.png"
                    alt="Categoria de destaque 1"
                    class="img-fluid"
                  />
                </div>
                <figcaption class="">FUTEBOL</figcaption>
              </figure>
            </a>
          </article>
          <article class="h-100 catCard">
            <a href="#" class="link2">
              <figure class="textCenter h-100">
                <div class="border">
                  <img
                    src="assets/media/images/home/categoria-destaque-2.png"
                    alt="Categoria de destaque 2"
                    class="img-fluid"
                  />
                </div>
                <figcaption>CORRIDA</figcaption>
              </figure>
            </a>
          </article>
          <article class="h-100 catCard">
            <a href="#" class="link2">
              <figure class="textCenter h-100">
                <div class="border">
                  <img
                    src="assets/media/images/home/categoria-destaque-3.png"
                    alt="Categoria de destaque 3"
                    class="img-fluid"
                  />
                </div>
                <figcaption>ACADEMIA</figcaption>
              </figure>
            </a>
          </article>
          <article class="h-100 catCard">
            <a href="#" class="link2">
              <figure class="textCenter h-100">
                <div class="border">
                  <img
                    src="assets/media/images/home/categoria-destaque-4.png"
                    alt="Categoria de destaque 4"
                    class="img-fluid"
                  />
                </div>
                <figcaption>TENIS</figcaption>
              </figure>
            </a>
          </article>
          <article class="h-100 catCard">
            <a href="#" class="link2">
              <figure class="textCenter h-100">
                <div class="border">
                  <img
                    src="assets/media/images/home/categoria-destaque-5.png"
                    alt="Categoria de destaque 5"
                    class="img-fluid"
                  />
                </div>
                <figcaption>BASQUETE</figcaption>
              </figure>
            </a>
          </article>
          <article class="h-100 catCard">
            <a href="#" class="link2">
              <figure class="textCenter h-100">
                <div class="border">
                  <img
                    src="assets/media/images/home/categoria-destaque-6.png"
                    alt="Categoria de destaque 6"
                    class="img-fluid"
                  />
                </div>
                <figcaption>NATAÇÃO</figcaption>
              </figure>
            </a>
          </article>
        </div>
      </div>

      <button
        type="button"
        class="catArrow catArrow-right"
        aria-label="Próxima categoria"
      >
        <i class="bi bi-chevron-right"></i>
      </button>
    </section>
  </body>
  <footer class="bgHeader">
    <p class="textCenter txtFooter">
      © PD Sports 2026 | Desenvolvido por Pablo, Pedro e Rafael.
    </p>
  </footer>
</html>
