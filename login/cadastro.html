<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro | PD Sports</title>
    <link
      rel="icon"
      href="/assets/media/icons/favicon.svg"
      type="image/x-icon"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="css/login.css" />
    <script src="../js/users/isNotAuthenticated.js" type="module"></script>
    <script src="js/cadastro.js" type="module" defer></script>
    <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
  </head>
  <body>
    <main class="loginPage textCenter">
      <section class="loginCard">
        <a href="../index.html">
          <img
            src="../assets/media/logo/logo-light.svg"
            alt="PD Sports"
            class="logo"
          />
        </a>

        <h1 class="mainTitle textCenter mb24">Registre-se</h1>

        <form class="regForm" autocomplete="on">
          <div class="formRows">
            <label class="txtInvisible" for="login-user"></label>
            <input
              id="login-user"
              name="usuario"
              type="text"
              placeholder="Email"
              autocomplete="email"
              required
            />

            <label class="txtInvisible" for="login-phone"></label>
            <input
              id="login-phone"
              name="phone"
              type="tel"
              oninput="mascaraTelefone(this)"
              placeholder="Telefone"
              autocomplete="tel"
              required
            />
          </div>
          <div class="formRows">
            <label class="txtInvisible" for="login-cpf"></label>
            <input
              id="login-cpf"
              name="cpf"
              type="text"
              oninput="mascaraCPF(this)"
              placeholder="CPF"
              required
            />

            <label class="txtInvisible" for="login-bday"></label>
            <input
              id="login-bday"
              name="usuario"
              type="date"
              placeholder="Data de Nascimento"
              autocomplete="bday"
              required
            />
          </div>
          <div class="formRows">
            <label class="txtInvisible" for="login-name"></label>
            <input
              id="login-name"
              name="firstname"
              type="text"
              placeholder="Nome"
              autocomplete="username"
              required
            />

            <input
              id="login-lastname"
              name="lastname"
              type="text"
              placeholder="Sobrenome"
              autocomplete="username"
              required
            />
          </div>
          <div class="formRows rowDate mb24">
            <label class="txtInvisible" for="login-password"></label>
            <input
              id="login-password"
              name="senha"
              type="password"
              placeholder="Senha"
              autocomplete="current-password"
              required
            />
            <label class="txtInvisible" for="login-confirm-password"></label>
            <input
              id="login-confirm-password"
              name="senha"
              type="password"
              placeholder="Confirmar Senha"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="btnPrimary mb24">Criar Conta</button>
        </form>
        <p class="subTitleCard">
          Já tem conta?
          <a href="./index.html" class="link subTitleCard">Faça o login</a>
        </p>
      </section>
    </main>
    <script>
      function mascaraCPF(input) {
        // Remove tudo o que não é dígito
        let valor = input.value.replace(/\D/g, "");

        // Aplica a formatação progressivamente
        valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
        valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
        valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

        input.value = valor;
      }

      function mascaraTelefone(input) {
        let valor = input.value.replace(/\D/g, ""); // Remove tudo que não é número

        if (valor.length > 10) {
          // Formato Celular: (00) 00000-0000
          valor = valor.replace(/^(\d{2})(\d{5})(\d{4}).*/, "($1) $2-$3");
        } else {
          // Formato Fixo: (00) 0000-0000
          valor = valor.replace(/^(\d{2})(\d{4})(\d{4}).*/, "($1) $2-$3");
        }

        input.value = valor;
      }
    </script>
  </body>
</html>
