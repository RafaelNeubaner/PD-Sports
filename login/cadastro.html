<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | PD Sports</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="css/login.css" />
    <script src="js/login.js" defer></script>
  </head>
  <body>
    <main class="loginPage textCenter">
      <section class="login-card">
        <a href="../index.html">
          <img
            src="../assets/media/logo/logo-light.svg"
            alt="PD Sports"
            class="logo"
          />
        </a>

        <h1 class="mainTitle textCenter mb24">Registre-se</h1>

        <form class="regForm" autocomplete="on">
          <div class="formRows">
            <label class="txtInvisible" for="login-user"></label>
            <input
              id="login-user"
              name="usuario"
              type="text"
              placeholder="Email"
              autocomplete="username"
              required
            />

            <label class="txtInvisible" for="login-password"></label>
            <input
              id="login-password"
              name="senha"
              type="password"
              placeholder="CPF"
              autocomplete="current-password"
              required
            />
          </div>
          <div class="formRows">
            <label class="txtInvisible" for="login-user"></label>
            <input
              id="login-user"
              name="usuario"
              type="text"
              placeholder="Nome"
              autocomplete="username"
              required
            />

            <label class="txtInvisible" for="login-password"></label>
            <input
              id="login-password"
              name="senha"
              type="password"
              placeholder="Senha"
              autocomplete="current-password"
              required
            />
          </div>
          <div class="formRows rowDate mb24">
            <label class="txtInvisible" for="login-user"></label>
            <input
              id="login-user"
              name="usuario"
              type="date"
              placeholder="Data de Nascimento"
              autocomplete="username"
              required
            />

            <label class="txtInvisible" for="login-password"></label>
            <input
              id="login-password"
              name="senha"
              type="password"
              placeholder="Confirmar Senha"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="btnPrimary mb24">Criar Conta</button>
        </form>
      </section>
    </main>
  </body>
</html>
